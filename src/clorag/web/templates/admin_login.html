<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Cyanview</title>
    <link rel="icon" href="https://support.cyanview.com/img/siteGfx/favicon.ico">
    <style>
        :root {
            --ifm-font-family-base: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
            --cyan-blue: #00a8e8;
            --cyan-dark: #0077b6;
            --cyanview-navy: #003366;
            --hero-bg: #003366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--ifm-font-family-base);
            line-height: 1.65;
            color: #1c1e21;
            background: linear-gradient(135deg, #003366 0%, #0077b6 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            margin: 1rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            height: 40px;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyanview-navy);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #606770;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cyan-blue);
            box-shadow: 0 0 0 3px rgba(0, 168, 232, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--cyan-blue);
            color: white;
        }

        .btn-primary:hover {
            background: var(--cyan-dark);
        }

        .btn-primary:disabled {
            background: #a0d2e8;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--cyan-dark);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="https://support.cyanview.com/img/siteGfx/Logo_Cyan_flat.svg" alt="Cyanview" class="login-logo">
            <h1 class="login-title">Admin Access</h1>
            <p class="login-subtitle">Enter your password to continue</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter admin password"
                    required
                    autofocus
                >
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary">
                Sign In
            </button>
        </form>

        <div class="back-link">
            <a href="/">Back to AI Search</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Check if already logged in
        async function checkSession() {
            try {
                const res = await fetch('/api/admin/session');
                const data = await res.json();
                if (data.authenticated) {
                    // Redirect to admin or previous page
                    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/admin';
                    window.location.href = redirect;
                }
            } catch (e) {
                console.error('Session check failed:', e);
            }
        }
        checkSession();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value.trim();
            if (!password) return;

            // Update UI
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Signing in...';
            errorMessage.classList.remove('show');

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                if (res.ok) {
                    // Success - redirect to admin or previous page
                    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/admin';
                    window.location.href = redirect;
                } else {
                    const data = await res.json();
                    errorMessage.textContent = data.detail || 'Invalid password';
                    errorMessage.classList.add('show');
                    passwordInput.focus();
                    passwordInput.select();
                }
            } catch (err) {
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>

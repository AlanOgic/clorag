<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - Cyanview</title>
    <link rel="icon" href="https://support.cyanview.com/img/siteGfx/favicon.ico">
    <style>
        :root {
            --ifm-font-family-base: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
            --cyan-blue: #00a8e8;
            --cyan-dark: #0077b6;
            --cyanview-navy: #003366;
            --hero-bg: #003366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--ifm-font-family-base);
            line-height: 1.65;
            color: #1c1e21;
            background: linear-gradient(135deg, #003366 0%, #0077b6 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            margin: 1rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            height: 40px;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyanview-navy);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #606770;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cyan-blue);
            box-shadow: 0 0 0 3px rgba(0, 168, 232, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--cyan-blue);
            color: white;
        }

        .btn-primary:hover {
            background: var(--cyan-dark);
        }

        .btn-primary:disabled {
            background: #a0d2e8;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--cyan-dark);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animated geometric background */
        #geometricBg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="geometricBg"></canvas>
    <div class="login-container">
        <div class="login-header">
            <img src="https://support.cyanview.com/img/siteGfx/Logo_Cyan_flat.svg" alt="Cyanview" class="login-logo">
            <h1 class="login-title">Admin Access</h1>
            <p class="login-subtitle">Enter your password to continue</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter admin password"
                    required
                    autofocus
                >
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary">
                Sign In
            </button>
        </form>

        <div class="back-link">
            <a href="/">Back to AI Search</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Security: Validate redirect URL to prevent open redirect attacks
        function getSafeRedirect() {
            const redirect = new URLSearchParams(window.location.search).get('redirect');
            // Only allow relative paths starting with / but not // (protocol-relative)
            if (redirect && redirect.startsWith('/') && !redirect.startsWith('//')) {
                return redirect;
            }
            return '/admin';
        }

        // Check if already logged in
        async function checkSession() {
            try {
                const res = await fetch('/api/admin/session');
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = getSafeRedirect();
                }
            } catch (e) {
                console.error('Session check failed:', e);
            }
        }
        checkSession();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value.trim();
            if (!password) return;

            // Update UI
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Signing in...';
            errorMessage.classList.remove('show');

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                if (res.ok) {
                    // Success - redirect to admin or previous page
                    window.location.href = getSafeRedirect();
                } else {
                    const data = await res.json();
                    errorMessage.textContent = data.detail || 'Invalid password';
                    errorMessage.classList.add('show');
                    passwordInput.focus();
                    passwordInput.select();
                }
            } catch (err) {
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });

        // ═══════════════════════════════════════════════════════════════════
        // Animated Geometric Background
        // ═══════════════════════════════════════════════════════════════════
        (function() {
            const canvas = document.getElementById('geometricBg');
            const ctx = canvas.getContext('2d');

            // Configuration
            const CONFIG = {
                shapeCount: 30,
                connectionDistance: 150,
                speed: { min: 0.15, max: 0.4 },
                rotationSpeed: { min: 0.001, max: 0.003 },
                sizeRange: { min: 15, max: 55 },
                colors: {
                    cyan: { r: 0, g: 168, b: 232 },
                    white: { r: 255, g: 255, b: 255 }
                }
            };

            let shapes = [];
            let animationId;

            // Shape types
            const TYPES = ['hexagon', 'pentagon', 'triangle', 'circle'];

            // Shape class
            class Shape {
                constructor() {
                    this.reset(true);
                }

                reset(initial = false) {
                    this.x = initial ? Math.random() * canvas.width : Math.random() * canvas.width;
                    this.y = initial ? Math.random() * canvas.height : Math.random() * canvas.height;
                    this.size = CONFIG.sizeRange.min + Math.random() * (CONFIG.sizeRange.max - CONFIG.sizeRange.min);
                    this.type = TYPES[Math.floor(Math.random() * TYPES.length)];
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (CONFIG.rotationSpeed.min + Math.random() * (CONFIG.rotationSpeed.max - CONFIG.rotationSpeed.min)) * (Math.random() > 0.5 ? 1 : -1);

                    const speed = CONFIG.speed.min + Math.random() * (CONFIG.speed.max - CONFIG.speed.min);
                    const angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;

                    // Visual properties
                    this.isCyan = Math.random() > 0.3; // 70% cyan, 30% white
                    this.baseOpacity = 0.1 + Math.random() * 0.2;
                    this.pulseOffset = Math.random() * Math.PI * 2;
                    this.pulseSpeed = 0.01 + Math.random() * 0.02;
                }

                update(time) {
                    // Movement
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;

                    // Wrap around edges with padding
                    const padding = this.size;
                    if (this.x < -padding) this.x = canvas.width + padding;
                    if (this.x > canvas.width + padding) this.x = -padding;
                    if (this.y < -padding) this.y = canvas.height + padding;
                    if (this.y > canvas.height + padding) this.y = -padding;

                    // Calculate current opacity with pulse
                    this.currentOpacity = this.baseOpacity + Math.sin(time * this.pulseSpeed + this.pulseOffset) * 0.1;
                }

                draw(ctx) {
                    const color = this.isCyan ? CONFIG.colors.cyan : CONFIG.colors.white;

                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);

                    // Fill
                    ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${this.currentOpacity * 0.5})`;
                    // Stroke
                    ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${this.currentOpacity + 0.2})`;
                    ctx.lineWidth = 1.5;

                    ctx.beginPath();

                    if (this.type === 'circle') {
                        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    } else {
                        const sides = this.type === 'triangle' ? 3 : this.type === 'pentagon' ? 5 : 6;
                        this.drawPolygon(ctx, sides);
                    }

                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }

                drawPolygon(ctx, sides) {
                    const radius = this.size / 2;
                    for (let i = 0; i < sides; i++) {
                        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                }
            }

            // Draw connections between nearby shapes
            function drawConnections(time) {
                ctx.lineWidth = 0.5;

                for (let i = 0; i < shapes.length; i++) {
                    for (let j = i + 1; j < shapes.length; j++) {
                        const dx = shapes[i].x - shapes[j].x;
                        const dy = shapes[i].y - shapes[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < CONFIG.connectionDistance) {
                            const opacity = (1 - distance / CONFIG.connectionDistance) * 0.15;
                            ctx.strokeStyle = `rgba(0, 168, 232, ${opacity})`;
                            ctx.beginPath();
                            ctx.moveTo(shapes[i].x, shapes[i].y);
                            ctx.lineTo(shapes[j].x, shapes[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            // Draw gradient background
            function drawBackground() {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#003366');
                gradient.addColorStop(1, '#0077b6');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Animation loop
            function animate(time) {
                drawBackground();

                // Update and draw shapes
                shapes.forEach(shape => {
                    shape.update(time);
                    shape.draw(ctx);
                });

                // Draw connections
                drawConnections(time);

                animationId = requestAnimationFrame(animate);
            }

            // Resize handler
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            // Initialize
            function init() {
                resize();

                // Create shapes
                shapes = [];
                for (let i = 0; i < CONFIG.shapeCount; i++) {
                    shapes.push(new Shape());
                }

                // Start animation
                animate(0);
            }

            // Event listeners
            window.addEventListener('resize', () => {
                resize();
            });

            // Start
            init();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
            });
        })();
    </script>
</body>
</html>

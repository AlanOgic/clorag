<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Settings - Cyanview Admin</title>
    <link rel="icon" href="https://support.cyanview.com/img/siteGfx/favicon.ico">
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        /* Page-specific: Page header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            color: var(--cyanview-navy);
        }

        /* Page-specific: Tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #eee;
            margin-bottom: 1.5rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--cyan-dark);
        }

        .tab.active {
            color: var(--cyan-dark);
            border-bottom-color: var(--cyan-dark);
            font-weight: 600;
        }

        /* Page-specific: Settings grid */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.25rem;
        }

        .setting-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1.25rem;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .setting-card:hover {
            border-color: var(--cyan-dark);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .setting-card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .setting-card__name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--cyanview-navy);
            margin: 0;
            word-break: break-all;
        }

        .setting-card__badges {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
            margin-left: 0.75rem;
        }

        .badge--type {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: #e8f4f8;
            color: var(--cyan-dark);
        }

        .badge--restart {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: #fff3cd;
            color: #856404;
        }

        .setting-card__body {
            margin-bottom: 0.75rem;
        }

        .setting-card__description {
            font-size: 0.85rem;
            color: #606770;
            margin: 0 0 0.75rem 0;
            line-height: 1.4;
        }

        .setting-card__input-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .setting-card__input-row input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            transition: border-color 0.2s;
        }

        .setting-card__input-row input:focus {
            outline: none;
            border-color: var(--cyan-dark);
        }

        .setting-card__footer {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid #f0f0f0;
        }

        .setting-card__meta {
            font-size: 0.78rem;
            color: #888;
        }

        .setting-card__meta--source {
            margin-left: auto;
            font-weight: 600;
        }

        .setting-card__meta--source.customized {
            color: #155724;
        }

        .setting-card__meta--source.default {
            color: #606770;
        }

        /* Page-specific: Version history */
        .version-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }

        .version-item {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .version-item:hover {
            background: #f8f9fa;
        }

        .version-item:last-child {
            border-bottom: none;
        }

        .version-item__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .version-item__number {
            font-weight: 600;
            color: var(--cyan-dark);
        }

        .version-item__date {
            font-size: 0.85rem;
            color: #888;
        }

        .version-item__note {
            font-size: 0.9rem;
            color: #606770;
        }

        .version-item__value {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            color: var(--cyanview-navy);
        }

        /* Page-specific: Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                overflow-x: auto;
            }
        }
    </style>
    <script src="/static/js/admin.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/admin" class="navbar__brand">
            <img src="/static/img/logo_cyanview.svg" alt="Cyanview" class="navbar__logo">
            <span class="navbar__badge">ADMIN</span>
        </a>
        <div class="navbar__links">
            <a href="/admin" class="navbar__link">Dashboard</a>
            <a href="/admin/ingestion" class="navbar__link">Ingestion</a>
            <a href="/admin/analytics" class="navbar__link">Analytics</a>
            <a href="/admin/metrics" class="navbar__link">Metrics</a>
            <a href="/admin/docs" class="navbar__link">Docs</a>
            <a href="/admin/prompts" class="navbar__link">Prompts</a>
            <a href="/admin/settings" class="navbar__link navbar__link--active">Settings</a>
            <span class="navbar__divider"></span>
            <a href="/" class="navbar__link">AI Search</a>
            <a href="/admin/cameras" class="navbar__link">Cameras</a>
            <button id="logoutBtn" class="btn-logout" style="display: none;">Logout</button>
        </div>
    </nav>

    <!-- Main -->
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">RAG Settings</h1>
            <div>
                <button class="btn btn-secondary" onclick="reloadAll()">Reload All</button>
                <button class="btn btn-primary" onclick="initializeDefaults()">Initialize Defaults</button>
            </div>
        </div>

        <!-- Alert container -->
        <div id="alertContainer"></div>

        <!-- Category tabs -->
        <div class="tabs">
            <button class="tab active" data-category="">All</button>
            <button class="tab" data-category="retrieval">Retrieval</button>
            <button class="tab" data-category="reranking">Reranking</button>
            <button class="tab" data-category="synthesis">Synthesis</button>
            <button class="tab" data-category="caches">Caches</button>
            <button class="tab" data-category="prefetch">Prefetch</button>
        </div>

        <!-- Settings grid -->
        <div class="settings-grid" id="settingsGrid">
            <div class="empty-state">Loading settings...</div>
        </div>
    </main>

    <!-- Version History Modal -->
    <div class="modal" id="versionModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2 class="modal-title">History: <span id="versionSettingName"></span></h2>
                <button class="modal-close" onclick="closeModal('versionModal')">&times;</button>
            </div>
            <div class="version-list" id="versionList">
                <div class="empty-state">Loading versions...</div>
            </div>
        </div>
    </div>

    <!-- Version Detail Modal -->
    <div class="modal" id="versionDetailModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2 class="modal-title">Version <span id="versionNumber"></span></h2>
                <button class="modal-close" onclick="closeModal('versionDetailModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Value at this version</label>
                <p id="versionValue" style="font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 1.1rem; color: var(--cyanview-navy);">-</p>
            </div>
            <div class="form-group">
                <label class="form-label">Change Note</label>
                <p id="versionNote">-</p>
            </div>
            <div class="form-group">
                <label class="form-label">Changed</label>
                <p id="versionCreated">-</p>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn btn-primary" onclick="rollbackToVersion()">Rollback to This Version</button>
                <button class="btn btn-secondary" onclick="closeModal('versionDetailModal')">Close</button>
            </div>
        </div>
    </div>

    <script nonce="{{ request.state.csp_nonce }}">
        let currentSettingId = null;
        let currentVersionNumber = null;
        let currentCategory = '';

        // Check session
        async function checkSession() {
            try {
                const response = await fetch('/api/admin/session', { credentials: 'include' });
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = '/admin/login?redirect=' + encodeURIComponent(window.location.pathname);
                }
            } catch (error) {
                window.location.href = '/admin/login?redirect=' + encodeURIComponent(window.location.pathname);
            }
        }

        // Load settings
        async function loadSettings(category) {
            if (category !== undefined) currentCategory = category;
            let url = '/api/admin/settings';
            if (currentCategory) url += `?category=${currentCategory}`;

            try {
                const response = await fetch(url, { credentials: 'include' });
                const settings = await response.json();

                const grid = document.getElementById('settingsGrid');
                if (!settings || settings.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No settings found. Click "Initialize Defaults" to seed the database.</div>';
                    return;
                }

                grid.innerHTML = settings.map(s => {
                    const inputType = 'number';
                    const step = s.value_type === 'float' ? '0.01' : '1';
                    const minAttr = s.min_value !== null && s.min_value !== undefined ? `min="${s.min_value}"` : '';
                    const maxAttr = s.max_value !== null && s.max_value !== undefined ? `max="${s.max_value}"` : '';

                    return `
                    <div class="setting-card" data-category="${escapeHtml(s.category)}">
                        <div class="setting-card__header">
                            <h3 class="setting-card__name">${escapeHtml(s.name)}</h3>
                            <div class="setting-card__badges">
                                <span class="badge badge--type">${escapeHtml(s.value_type)}</span>
                                ${s.requires_restart ? '<span class="badge badge--restart">Restart</span>' : ''}
                            </div>
                        </div>
                        <div class="setting-card__body">
                            <p class="setting-card__description">${escapeHtml(s.description)}</p>
                            <div class="setting-card__input-row">
                                <input type="${inputType}" step="${step}" ${minAttr} ${maxAttr}
                                       id="input-${s.id || s.key}" value="${s.value}">
                                <button class="btn btn-sm btn-primary" onclick="saveSetting('${s.id}', '${escapeHtml(s.key)}')">Save</button>
                                ${s.id ? `<button class="btn btn-sm btn-secondary" onclick="showVersions('${s.id}', '${escapeHtml(s.name)}')">History</button>` : ''}
                            </div>
                        </div>
                        <div class="setting-card__footer">
                            <span class="setting-card__meta">Default: ${s.default_value}</span>
                            ${s.min_value !== null && s.min_value !== undefined ? `<span class="setting-card__meta">Min: ${s.min_value}</span>` : ''}
                            ${s.max_value !== null && s.max_value !== undefined ? `<span class="setting-card__meta">Max: ${s.max_value}</span>` : ''}
                            <span class="setting-card__meta setting-card__meta--source ${s.source === 'database' ? 'customized' : 'default'}">${s.source === 'database' ? 'Customized' : 'Default'}</span>
                        </div>
                    </div>`;
                }).join('');
            } catch (error) {
                showAlert('Failed to load settings: ' + error.message, 'error');
            }
        }

        // Save setting
        async function saveSetting(settingId, settingKey) {
            const input = document.getElementById(`input-${settingId || settingKey}`);
            if (!input) return;

            const value = parseFloat(input.value);
            if (isNaN(value)) {
                showAlert('Invalid value', 'error');
                return;
            }

            try {
                const endpoint = settingId
                    ? `/api/admin/settings/${settingId}`
                    : `/api/admin/settings/by-key/${settingKey}`;
                const response = await AdminUtils.putJson(endpoint, { value: value });

                if (response.ok) {
                    showAlert(`Setting "${settingKey}" saved successfully`, 'success');
                    loadSettings();
                } else {
                    const err = await response.json();
                    showAlert(err.detail || 'Failed to save setting', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // Show version history
        async function showVersions(settingId, settingName) {
            currentSettingId = settingId;
            document.getElementById('versionSettingName').textContent = settingName;
            document.getElementById('versionList').innerHTML = '<div class="empty-state">Loading versions...</div>';
            document.getElementById('versionModal').classList.add('active');

            try {
                const response = await fetch(`/api/admin/settings/${settingId}/versions`, { credentials: 'include' });
                const versions = await response.json();

                const list = document.getElementById('versionList');
                if (!versions || versions.length === 0) {
                    list.innerHTML = '<div class="empty-state">No version history yet</div>';
                    return;
                }

                list.innerHTML = versions.map(v => `
                    <div class="version-item" onclick="viewVersion(${v.version})">
                        <div class="version-item__header">
                            <span class="version-item__number">Version ${v.version}</span>
                            <span class="version-item__date">${formatDate(v.created_at)}</span>
                        </div>
                        <div class="version-item__value">Value: ${escapeHtml(String(v.value))}</div>
                        <div class="version-item__note">${escapeHtml(v.change_note || 'No note')}</div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('versionList').innerHTML = '<div class="empty-state">Failed to load versions</div>';
            }
        }

        // View version detail
        async function viewVersion(version) {
            try {
                const response = await fetch(`/api/admin/settings/${currentSettingId}/versions`, { credentials: 'include' });
                const versions = await response.json();
                const v = versions.find(ver => ver.version === version);

                if (!v) {
                    showAlert('Version not found', 'error');
                    return;
                }

                currentVersionNumber = version;
                document.getElementById('versionNumber').textContent = version;
                document.getElementById('versionValue').textContent = v.value;
                document.getElementById('versionNote').textContent = v.change_note || 'No note';
                document.getElementById('versionCreated').textContent = formatDate(v.created_at);

                document.getElementById('versionDetailModal').classList.add('active');
            } catch (error) {
                showAlert('Failed to load version: ' + error.message, 'error');
            }
        }

        // Rollback to version
        async function rollbackToVersion() {
            if (!currentSettingId || !currentVersionNumber) return;

            if (!confirm(`Rollback to version ${currentVersionNumber}? This will create a new version with that value.`)) return;

            try {
                const response = await AdminUtils.postJson(`/api/admin/settings/${currentSettingId}/rollback`, { version: currentVersionNumber });

                if (response.ok) {
                    showAlert('Rolled back successfully', 'success');
                    closeModal('versionDetailModal');
                    closeModal('versionModal');
                    loadSettings();
                } else {
                    const err = await response.json();
                    showAlert(err.detail || 'Rollback failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // Initialize defaults
        async function initializeDefaults() {
            if (!confirm('Initialize database with default settings? Existing customized settings will not be overwritten.')) return;

            try {
                const response = await AdminUtils.postJson('/api/admin/settings/initialize', {});

                if (response.ok) {
                    const result = await response.json();
                    showAlert(`Initialized: ${result.created || 0} created, ${result.updated || 0} updated, ${result.skipped || 0} skipped`, 'success');
                    loadSettings();
                } else {
                    const err = await response.json();
                    showAlert(err.detail || 'Initialization failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // Reload all settings
        async function reloadAll() {
            try {
                const response = await AdminUtils.postJson('/api/admin/settings/reload', {});

                if (response.ok) {
                    showAlert('All settings reloaded', 'success');
                    loadSettings();
                } else {
                    const err = await response.json();
                    showAlert(err.detail || 'Reload failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Show alert
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Format date
        function formatDate(isoString) {
            if (!isoString) return '-';
            return new Date(isoString).toLocaleString();
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadSettings(tab.dataset.category);
            });
        });

        // Close modals on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) {
                    closeModal(modal.id);
                }
            });
        });

        // Initialize
        checkSession().then(() => {
            loadSettings();
        });
    </script>
</body>
</html>

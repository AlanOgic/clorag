<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyanview AI Lexicon</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #131820;
    --panel-hover: #1a212c;
    --border: #232b38;
    --text: #e6edf3;
    --text-dim: #8b95a5;
    --accent: #00d4ff;
    --accent-dim: #007a99;
    --tag-fund: #00d4ff;
    --tag-agent: #b87aff;
    --tag-mcp: #ff8c42;
    --tag-ops: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    padding: 32px 24px;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  h1 .accent { color: var(--accent); }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search {
    flex: 1;
    min-width: 240px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--text-dim); }
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .filter-btn:hover { background: var(--panel-hover); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .filter-btn[data-cat="fundamentals"].active { background: var(--tag-fund); border-color: var(--tag-fund); }
  .filter-btn[data-cat="agentic"].active { background: var(--tag-agent); border-color: var(--tag-agent); }
  .filter-btn[data-cat="mcp"].active { background: var(--tag-mcp); border-color: var(--tag-mcp); }
  .filter-btn[data-cat="ops"].active { background: var(--tag-ops); border-color: var(--tag-ops); color: var(--bg); }
  .stats {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    transition: all 0.15s;
  }
  .card:hover {
    background: var(--panel-hover);
    border-color: #2d3645;
    transform: translateY(-1px);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }
  .term {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .tag {
    font-size: 9px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
    background: rgba(0, 212, 255, 0.15);
    color: var(--tag-fund);
  }
  .tag[data-cat="fundamentals"] { background: rgba(0, 212, 255, 0.12); color: var(--tag-fund); }
  .tag[data-cat="agentic"] { background: rgba(184, 122, 255, 0.15); color: var(--tag-agent); }
  .tag[data-cat="mcp"] { background: rgba(255, 140, 66, 0.15); color: var(--tag-mcp); }
  .tag[data-cat="ops"] { background: rgba(74, 222, 128, 0.15); color: var(--tag-ops); }
  .definition {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }
  .definition strong { color: var(--text); font-weight: 500; }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
  }
  mark {
    background: rgba(0, 212, 255, 0.25);
    color: var(--text);
    padding: 0 2px;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Cyanview <span class="accent">AI Lexicon</span></h1>
    <div class="subtitle">Common & uncommon AI terms — a shared vocabulary for the team</div>
  </header>

  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search a term or keyword…" autofocus>
    <div class="filters">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="fundamentals">Fundamentals</button>
      <button class="filter-btn" data-cat="agentic">Agentic</button>
      <button class="filter-btn" data-cat="mcp">MCP</button>
      <button class="filter-btn" data-cat="ops">Ops & Infra</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No term matches your search.</div>

  <footer>Cyanview internal reference · maintained by the AI team</footer>
</div>

<script>
const TERMS = [
  // ============ FUNDAMENTALS ============
  { term: "LLM", cat: "fundamentals", def: "<strong>Large Language Model.</strong> A neural network trained on massive text corpora to predict the next token. Examples: Claude, GPT, Gemini, Llama." },
  { term: "Token", cat: "fundamentals", def: "The atomic unit an LLM reads and writes. Roughly ¾ of a word in English. Pricing, context windows, and rate limits are all measured in tokens." },
  { term: "Context window", cat: "fundamentals", def: "The maximum number of tokens a model can process in one shot (input + output). Modern models range from 128K to 1M+ tokens." },
  { term: "Prompt", cat: "fundamentals", def: "The instruction sent to the model. The art of writing good ones is <strong>prompt engineering</strong>." },
  { term: "System prompt", cat: "fundamentals", def: "A persistent instruction defining the model's role, tone, and constraints — invisible to the end user but seen by the model on every turn." },
  { term: "Temperature", cat: "fundamentals", def: "A parameter (0 → 1+) controlling randomness. Low = deterministic, factual. High = creative, varied." },
  { term: "Hallucination", cat: "fundamentals", def: "When the model invents facts confidently. The single biggest risk in production AI." },
  { term: "Fine-tuning", cat: "fundamentals", def: "Continuing training on a custom dataset to specialize a base model. Expensive — usually replaced today by RAG or prompting." },
  { term: "RAG", cat: "fundamentals", def: "<strong>Retrieval-Augmented Generation.</strong> Fetch relevant docs from a knowledge base, inject them into the prompt, then generate. The standard pattern for grounding answers in your own data (e.g. CLORAG)." },
  { term: "Embedding", cat: "fundamentals", def: "A vector representation of text. Two semantically close pieces of text have close vectors. The basis of semantic search." },
  { term: "Vector database", cat: "fundamentals", def: "A database optimized to store and query embeddings by similarity. Examples: Qdrant, Pinecone, Weaviate." },
  { term: "Chunking", cat: "fundamentals", def: "Splitting documents into smaller pieces before embedding. Chunk size and overlap dramatically affect RAG quality." },
  { term: "Reranking", cat: "fundamentals", def: "A second model that re-orders retrieved chunks by true relevance. Boosts RAG precision significantly." },
  { term: "Few-shot prompting", cat: "fundamentals", def: "Showing the model 2-5 examples of the task in the prompt before asking it to perform. Cheap and very effective." },
  { term: "Chain-of-thought", cat: "fundamentals", def: "Prompting the model to reason step by step before answering. Improves accuracy on complex tasks." },
  { term: "Multimodal", cat: "fundamentals", def: "A model handling more than text — images, audio, video, PDFs. Claude, GPT-4o, Gemini are multimodal." },

  // ============ AGENTIC ============
  { term: "Agent", cat: "agentic", def: "An LLM running in a loop with access to tools, that decides which actions to take to accomplish a goal — not just answer a question." },
  { term: "Tool / Function calling", cat: "agentic", def: "The mechanism by which a model emits a structured request to call an external function (search, API, database). The foundation of all agentic behavior." },
  { term: "Agentic loop", cat: "agentic", def: "Think → call tool → observe result → think again → repeat until done. The runtime of every agent." },
  { term: "Orchestrator", cat: "agentic", def: "A higher-level agent (often a smarter model) that delegates subtasks to specialized worker agents. Pattern: Sonnet orchestrator + Haiku workers." },
  { term: "Multi-agent system", cat: "agentic", def: "Several agents collaborating, each with a role (planner, researcher, critic, executor). Powerful but harder to debug." },
  { term: "Sub-agent", cat: "agentic", def: "A specialized agent invoked by an orchestrator for a focused task. Keeps the main context window clean." },
  { term: "ReAct", cat: "agentic", def: "<strong>Reason + Act.</strong> The original prompting pattern that made tool-using agents work: alternating reasoning steps with actions." },
  { term: "Planner / Executor", cat: "agentic", def: "An architecture where one model writes a plan and another (or the same) carries out steps. Reduces hallucination on long tasks." },
  { term: "Memory (short / long-term)", cat: "agentic", def: "Short-term = the current conversation. Long-term = persisted facts the agent recalls across sessions (vectors, KV store, graph)." },
  { term: "Guardrails", cat: "agentic", def: "Filters, validators, and policies that prevent an agent from doing dangerous or off-topic things. Input and output side." },
  { term: "Human-in-the-loop", cat: "agentic", def: "The agent pauses for human approval before high-stakes actions (sending email, confirming a quote, deleting data)." },
  { term: "Autonomy level", cat: "agentic", def: "How far an agent can act without asking permission. Spectrum: suggest → assist → execute with confirmation → fully autonomous." },
  { term: "Workflow vs Agent", cat: "agentic", def: "<strong>Workflow:</strong> hardcoded steps with LLM calls inside (n8n, Zapier). <strong>Agent:</strong> the LLM decides the steps. Workflows are more reliable; agents more flexible." },

  // ============ MCP ============
  { term: "MCP", cat: "mcp", def: "<strong>Model Context Protocol.</strong> Open standard (Anthropic, 2024) for connecting LLMs to external tools and data sources. The 'USB-C of AI integrations'." },
  { term: "MCP Server", cat: "mcp", def: "A process exposing tools, resources, and prompts to any MCP-compatible client. Examples: Odoo MCP, CLORAG MCP, Gmail MCP, Drive MCP." },
  { term: "MCP Client", cat: "mcp", def: "The host that consumes MCP servers — Claude Desktop, Cursor, Claude Code, Open WebUI, custom apps." },
  { term: "Tool (MCP)", cat: "mcp", def: "An action exposed by a server that the model can invoke (e.g. <code>execute_method</code>, <code>create_quote</code>, <code>search_knowledge</code>)." },
  { term: "Resource (MCP)", cat: "mcp", def: "Read-only data the server makes available to the model — files, DB rows, API responses — addressable by URI." },
  { term: "Prompt (MCP)", cat: "mcp", def: "A reusable templated prompt the server offers to the client. Like a slash-command shortcut." },
  { term: "Transport", cat: "mcp", def: "How client and server talk: <strong>stdio</strong> (local), <strong>SSE</strong> (deprecated), <strong>Streamable HTTP</strong> (the modern remote standard)." },
  { term: "Tool schema", cat: "mcp", def: "The JSON Schema describing a tool's name, description, and parameters. The model reads this to know what it can call and how." },
  { term: "Connector", cat: "mcp", def: "Anthropic's term for a hosted MCP integration available in Claude.ai (Gmail, Drive, Asana, custom servers)." },
  { term: "Remote MCP", cat: "mcp", def: "An MCP server hosted as a web service (HTTPS), accessible from any client without local install. The deployment model for SaaS like ood.ooo." },
  { term: "Tool poisoning", cat: "mcp", def: "A security risk where a malicious MCP server hides instructions in tool descriptions to manipulate the model. Why you only install trusted servers." },

  // ============ OPS & INFRA ============
  { term: "Inference", cat: "ops", def: "Running a trained model to generate output. Distinct from training. The cost center of any AI product." },
  { term: "Quantization", cat: "ops", def: "Reducing weight precision (FP16 → INT8 → INT4) to fit bigger models on smaller GPUs. Q4_K_M is a popular GGUF quant." },
  { term: "GGUF", cat: "ops", def: "The binary format for running quantized open-source models locally (llama.cpp, Ollama, LM Studio)." },
  { term: "vLLM / SGLang", cat: "ops", def: "High-performance inference servers for self-hosted LLMs. vLLM is the de-facto standard for throughput; SGLang excels at structured generation." },
  { term: "Ollama", cat: "ops", def: "The simplest way to run open-source LLMs locally. CLI + REST API. Great for prototyping on your RTX 5090." },
  { term: "Latency vs Throughput", cat: "ops", def: "<strong>Latency:</strong> time to first token / total response. <strong>Throughput:</strong> tokens/sec aggregated across users. Trade-offs in batching." },
  { term: "TTFT", cat: "ops", def: "<strong>Time To First Token.</strong> The user-felt latency. Streaming hides total time but TTFT is what feels slow or fast." },
  { term: "KV cache", cat: "ops", def: "The model's working memory of past tokens. Prompt caching (Anthropic, OpenAI) reuses it across calls — major cost saver on long system prompts." },
  { term: "Prompt caching", cat: "ops", def: "Charging less (and answering faster) for repeated prefixes. Cuts costs 90% on RAG-style apps where the system prompt is huge and stable." },
  { term: "Batch inference", cat: "ops", def: "Sending many requests at once for ~50% discount and looser latency SLA. Anthropic and OpenAI both offer it." },
  { term: "Streaming", cat: "ops", def: "Sending tokens to the client as they're generated (SSE). Mandatory for good UX on anything > 1 second." },
  { term: "Eval", cat: "ops", def: "A test suite measuring model output quality on your task. Without evals you're flying blind — every prompt change is a guess." },
  { term: "Distillation", cat: "ops", def: "Training a small model to mimic a big one. How Haiku-class models get surprisingly good." },
  { term: "Observability (LLMOps)", cat: "ops", def: "Logging prompts, responses, tool calls, latency, cost, errors. Tools: Langfuse, LangSmith, Helicone, Arize." }
];

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const stats = document.getElementById('stats');
const empty = document.getElementById('empty');
const filterBtns = document.querySelectorAll('.filter-btn');

let activeCat = 'all';
let query = '';

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

const CAT_LABEL = {
  fundamentals: 'Fundamentals',
  agentic: 'Agentic',
  mcp: 'MCP',
  ops: 'Ops & Infra'
};

function render() {
  const q = query.trim().toLowerCase();
  const filtered = TERMS.filter(t => {
    if (activeCat !== 'all' && t.cat !== activeCat) return false;
    if (!q) return true;
    return t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q);
  });

  // Sort alphabetically within each category, with category order
  const catOrder = ['fundamentals', 'agentic', 'mcp', 'ops'];
  filtered.sort((a, b) => {
    const ca = catOrder.indexOf(a.cat) - catOrder.indexOf(b.cat);
    if (ca !== 0) return ca;
    return a.term.localeCompare(b.term);
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    stats.textContent = '';
    return;
  }
  empty.style.display = 'none';
  stats.textContent = `${filtered.length} term${filtered.length > 1 ? 's' : ''} · ${TERMS.length} total`;

  grid.innerHTML = filtered.map(t => {
    const term = q ? highlight(escapeHtml(t.term), q) : escapeHtml(t.term);
    // Definition contains trusted HTML (<strong>, <code>) authored above — highlight on plain text portions only
    const def = q ? t.def.replace(/(>)([^<]+)(<)/g, (m, a, txt, c) => a + highlight(txt, q) + c) : t.def;
    return `
      <div class="card">
        <div class="card-header">
          <div class="term">${term}</div>
          <span class="tag" data-cat="${t.cat}">${CAT_LABEL[t.cat]}</span>
        </div>
        <div class="definition">${def}</div>
      </div>
    `;
  }).join('');
}

search.addEventListener('input', e => { query = e.target.value; render(); });
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
  });
});

render();
</script>
</body>
</html>

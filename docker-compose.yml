services:
  clorag-web:
    build: .
    container_name: clorag-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_DOCS_COLLECTION=${QDRANT_DOCS_COLLECTION:-docusaurus_docs}
      - QDRANT_CASES_COLLECTION=${QDRANT_CASES_COLLECTION:-gmail_cases}
      - VOYAGE_DIMENSIONS=${VOYAGE_DIMENSIONS:-1024}
      - DATABASE_PATH=${DATABASE_PATH:-data/clorag.db}
      - SEARXNG_URL=${SEARXNG_URL:-https://search.sapti.me}
      - ANALYTICS_DATABASE_PATH=${ANALYTICS_DATABASE_PATH:-data/analytics.db}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - OPENAI_COMPAT_API_KEY_FILE=/run/secrets/openai_compat_api_key
      # Docker Secrets: keys read from /run/secrets/ via _FILE convention
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - VOYAGE_API_KEY_FILE=/run/secrets/voyage_api_key
      - QDRANT_API_KEY_FILE=/run/secrets/qdrant_api_key
      - ADMIN_PASSWORD_FILE=/run/secrets/admin_password
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
      # Odoo MCP integration
      - ODOO_MCP_ENABLED=${ODOO_MCP_ENABLED:-false}
      - ODOO_MCP_URL=${ODOO_MCP_URL:-http://odoo-mcp:8080}
      - ODOO_MCP_API_KEY_FILE=/run/secrets/odoo_mcp_api_key
      - ODOO_MCP_TIMEOUT=${ODOO_MCP_TIMEOUT:-30}
      - ODOO_MCP_CACHE_TTL=${ODOO_MCP_CACHE_TTL:-300}
    secrets:
      - anthropic_api_key
      - voyage_api_key
      - qdrant_api_key
      - admin_password
      - neo4j_password
      - openai_compat_api_key
      - odoo_mcp_api_key
    volumes:
      - ./data:/app/data
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
      - ./token_drafts.json:/app/token_drafts.json
    networks:
      - clorag-network
    depends_on:
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  clorag-mcp:
    build: .
    container_name: clorag-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8080"
    command: ["python", "-m", "clorag.mcp.server", "--http"]
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_DOCS_COLLECTION=${QDRANT_DOCS_COLLECTION:-docusaurus_docs}
      - QDRANT_CASES_COLLECTION=${QDRANT_CASES_COLLECTION:-gmail_cases}
      - VOYAGE_DIMENSIONS=${VOYAGE_DIMENSIONS:-1024}
      - DATABASE_PATH=${DATABASE_PATH:-data/clorag.db}
      - ANALYTICS_DATABASE_PATH=${ANALYTICS_DATABASE_PATH:-data/analytics.db}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      # Docker Secrets
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - VOYAGE_API_KEY_FILE=/run/secrets/voyage_api_key
      - QDRANT_API_KEY_FILE=/run/secrets/qdrant_api_key
      - ADMIN_PASSWORD_FILE=/run/secrets/admin_password
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
    secrets:
      - anthropic_api_key
      - voyage_api_key
      - qdrant_api_key
      - admin_password
      - neo4j_password
    volumes:
      - ./data:/app/data
    networks:
      - clorag-network
    depends_on:
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  neo4j:
    image: neo4j:5.26.0-community
    container_name: clorag-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"  # Browser UI (localhost only)
      - "127.0.0.1:7687:7687"  # Bolt protocol (localhost only)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - clorag-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  clorag-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:

# Docker Secrets — files stored outside the repo
# On the server, create: /opt/clorag/secrets/<secret_name>
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  voyage_api_key:
    file: ./secrets/voyage_api_key
  qdrant_api_key:
    file: ./secrets/qdrant_api_key
  admin_password:
    file: ./secrets/admin_password
  neo4j_password:
    file: ./secrets/neo4j_password
  openai_compat_api_key:
    file: ./secrets/openai_compat_api_key
  odoo_mcp_api_key:
    file: ./secrets/odoo_mcp_api_key

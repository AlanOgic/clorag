services:
  clorag-web:
    build: .
    container_name: clorag-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_DOCS_COLLECTION=${QDRANT_DOCS_COLLECTION:-docusaurus_docs}
      - QDRANT_CASES_COLLECTION=${QDRANT_CASES_COLLECTION:-gmail_cases}
      - VOYAGE_DIMENSIONS=${VOYAGE_DIMENSIONS:-1024}
      - DATABASE_PATH=${DATABASE_PATH:-data/clorag.db}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SEARXNG_URL=${SEARXNG_URL:-https://search.sapti.me}
      - ANALYTICS_DATABASE_PATH=${ANALYTICS_DATABASE_PATH:-data/analytics.db}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      # Odoo MCP Integration
      - ODOO_MCP_ENABLED=${ODOO_MCP_ENABLED:-false}
      - ODOO_MCP_URL=http://odoo-mcp:8080
      - ODOO_MCP_API_KEY=${ODOO_MCP_API_KEY}
      - ODOO_MCP_TIMEOUT=${ODOO_MCP_TIMEOUT:-30}
      - ODOO_MCP_CACHE_TTL=${ODOO_MCP_CACHE_TTL:-300}
    volumes:
      - ./data:/app/data
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
      - ./token_drafts.json:/app/token_drafts.json
    networks:
      - clorag-network
    depends_on:
      - neo4j

  # Odoo MCP Server (optional, enable via ODOO_MCP_ENABLED=true)
  odoo-mcp:
    image: alanogik/odoo-mcp-19:latest
    container_name: clorag-odoo-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - ODOO_URL=${ODOO_URL}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_API_KEY=${ODOO_API_KEY}
      - MCP_TRANSPORT=streamable-http
      - MCP_API_KEY=${ODOO_MCP_API_KEY}
    networks:
      - clorag-network
    profiles:
      - odoo  # Only start with: docker compose --profile odoo up

  neo4j:
    image: neo4j:5-community
    container_name: clorag-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"  # Browser UI (localhost only)
      - "127.0.0.1:7687:7687"  # Bolt protocol (localhost only)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - clorag-network

networks:
  clorag-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
